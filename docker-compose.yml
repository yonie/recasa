services:
  recasa:
    build: .
    ports:
      - "${RECASA_PORT}:8080"
    volumes:
      - "${PHOTOS_PATH}:/photos:ro"
      - recasa_data:/data
    environment:
      - PHOTOS_DIR=/photos
      - DATA_DIR=/data
      - OLLAMA_URL=${OLLAMA_URL}
      - OLLAMA_MODEL=${OLLAMA_MODEL}
      - WATCH_INTERVAL=${WATCH_INTERVAL}
      - LOG_LEVEL=${LOG_LEVEL}
      - MAX_CONCURRENT=${MAX_CONCURRENT}
      - ENABLE_EXIF_EXTRACTION=${ENABLE_EXIF_EXTRACTION}
      - ENABLE_GEOCODING=${ENABLE_GEOCODING}
      - ENABLE_THUMBNAILS=${ENABLE_THUMBNAILS}
      - ENABLE_MOTION_PHOTOS=${ENABLE_MOTION_PHOTOS}
      - ENABLE_HASHING=${ENABLE_HASHING}
      - ENABLE_FACE_DETECTION=${ENABLE_FACE_DETECTION}
      - ENABLE_CAPTIONING=${ENABLE_CAPTIONING}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 12G

volumes:
  recasa_data:
